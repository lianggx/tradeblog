<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>标签管理 - 管理后台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f4f4f4;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            background: #333;
            color: #fff;
            padding: 10px 0;
            margin-bottom: 20px;
        }
        
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        nav h1 {
            font-size: 1.5rem;
        }
        
        nav ul {
            display: flex;
            list-style: none;
        }
        
        nav ul li {
            margin-left: 20px;
        }
        
        nav ul li a {
            color: #fff;
            text-decoration: none;
        }
        
        .card {
            background: #fff;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            padding: 20px;
            margin-bottom: 20px;
        }
        
        h2 {
            margin-bottom: 20px;
            color: #333;
        }
        
        .btn {
            display: inline-block;
            padding: 8px 16px;
            background: #333;
            color: #fff;
            text-decoration: none;
            border-radius: 4px;
            margin-right: 10px;
        }
        
        .btn-primary {
            background: #007bff;
        }
        
        .btn-secondary {
            background: #6c757d;
        }
        
        .btn-danger {
            background: #dc3545;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        table th,
        table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        
        table th {
            background-color: #f2f2f2;
        }
        
        .actions {
            display: flex;
            gap: 10px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
        }
        
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        
        .form-group textarea {
            height: 150px;
        }
        
        .alert {
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 4px;
        }
        
        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .alert-danger {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
        }
        
        .tag-item {
            background: #f2f2f2;
            padding: 8px 16px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <h1>管理后台</h1>
            <ul>
                <li><a href="/admin">首页</a></li>
                <li><a href="/admin/articles">文章管理</a></li>
                <li><a href="/admin/tags">标签管理</a></li>
                <li><a href="/admin/login">退出登录</a></li>
            </ul>
        </nav>
    </header>
    
    <div class="container">
        <div class="card">
            <h2>标签管理</h2>
            <form id="tagForm" class="form-inline" style="margin-bottom: 20px;">
                <div class="form-group" style="display: flex; gap: 10px; align-items: end;">
                    <div style="flex: 1;">
                        <label for="tagName">标签名称</label>
                        <input type="text" id="tagName" name="tagName" required>
                    </div>
                    <div>
                        <button type="submit" class="btn btn-primary">添加标签</button>
                    </div>
                </div>
            </form>
            
            <div class="tag-list" id="tagList">
                <!-- 标签列表将通过JavaScript动态添加 -->
            </div>
        </div>
    </div>
    
    <script>
        // 页面加载时获取标签列表
        document.addEventListener('DOMContentLoaded', function() {
            fetchTags();
            
            // 表单提交事件
            document.getElementById('tagForm').addEventListener('submit', function(e) {
                e.preventDefault();
                addTag();
            });
        });
        
        // 获取标签列表
        function fetchTags() {
            fetch('/api/tags')
                .then(response => response.json())
                .then(data => {
                    const tagList = document.getElementById('tagList');
                    tagList.innerHTML = '';
                    
                    data.forEach(tag => {
                        const tagItem = document.createElement('div');
                        tagItem.className = 'tag-item';
                        tagItem.innerHTML = `
                            <span>${tag.name}</span>
                            <button class="btn btn-danger" onclick="deleteTag('${tag.name}')">删除</button>
                        `;
                        tagList.appendChild(tagItem);
                    });
                })
                .catch(error => {
                    console.error('获取标签列表失败:', error);
                });
        }
        
        // 添加标签
        function addTag() {
            const tagName = document.getElementById('tagName').value.trim();
            
            if (!tagName) {
                alert('请输入标签名称');
                return;
            }
            
            fetch('/api/tags', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ name: tagName })
            })
            .then(response => response.json())
            .then(data => {
                alert('标签添加成功！');
                document.getElementById('tagForm').reset();
                fetchTags();
            })
            .catch(error => {
                console.error('添加标签失败:', error);
            });
        }
        
        // 删除标签
        function deleteTag(tagName) {
            if (confirm(`确定要删除标签 "${tagName}" 吗？`)) {
                fetch(`/api/tags/${encodeURIComponent(tagName)}`, {
                    method: 'DELETE'
                })
                .then(response => response.json())
                .then(data => {
                    alert('标签删除成功！');
                    fetchTags();
                })
                .catch(error => {
                    console.error('删除标签失败:', error);
                });
            }
        }
    </script>
</body>
</html>
