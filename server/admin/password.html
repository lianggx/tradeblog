<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改密码 - 管理后台</title>
    <script src="/admin/common-header.js"></script>
    <link rel="stylesheet" href="/admin/admin.css">
</head>
<body>
    <!-- 公共头部将通过 JavaScript 加载 -->
    <div class="container">
        <div class="card">
            <h2>修改密码</h2>
            <div id="message" class="alert" style="display: none;"></div>
            <form id="passwordForm">
                <div class="form-group">
                    <label for="currentPassword">当前密码</label>
                    <input type="password" id="currentPassword" name="currentPassword" required>
                </div>
                <div class="form-group">
                    <label for="newPassword">新密码</label>
                    <input type="password" id="newPassword" name="newPassword" required>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">确认新密码</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required>
                </div>
                <div class="flex-end">
                    <a href="/admin" class="btn btn-secondary">取消</a>
                    <button type="submit" class="btn btn-primary">修改密码</button>
                </div>
            </form>
        </div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('passwordForm').addEventListener('submit', function(e) {
                e.preventDefault();
                
                const currentPassword = document.getElementById('currentPassword').value;
                const newPassword = document.getElementById('newPassword').value;
                const confirmPassword = document.getElementById('confirmPassword').value;
                
                if (newPassword !== confirmPassword) {
                    showMessage('两次输入的密码不一致', 'danger');
                    return;
                }
                
                if (newPassword.length < 6) {
                    showMessage('密码长度至少为6位', 'danger');
                    return;
                }
                
                fetch('/api/change-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        currentPassword, 
                        newPassword 
                    })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.message) {
                        showMessage(data.message, 'success');
                        document.getElementById('passwordForm').reset();
                    } else if (data.error) {
                        showMessage(data.error, 'danger');
                    }
                })
                .catch(error => {
                    console.error('修改密码失败:', error);
                    showMessage('修改密码失败，请稍后重试', 'danger');
                });
            });
        });
        
        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = `alert alert-${type}`;
            messageDiv.style.display = 'block';
            
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
