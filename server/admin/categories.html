<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分类管理 - 管理后台</title>
    <script src="/admin/common-header.js"></script>
    <script src="/admin/common-page.js"></script>
    <script src="/admin/common-crud.js"></script>
    <link rel="stylesheet" href="/admin/admin.css">
    <style>
        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .category-header h2 {
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .category-header h2::before {
            content: '📁';
            font-size: 24px;
        }
        
        .category-form-container {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #e0e0e0;
        }
        
        .category-form-container label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            color: #333;
            margin-bottom: 8px;
        }
        
        .category-form-container label::before {
            content: '✏️';
            font-size: 14px;
        }
        
        .category-form-container input {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 10px 15px;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        .category-form-container input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 119, 204, 0.1);
        }
        
        .category-form-container button {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 500;
        }
        
        .category-form-container button::before {
            content: '➕';
            font-size: 14px;
        }
        
        .category-stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .stat-item {
            background: linear-gradient(135deg, #ffffff 0%, #f8f9fa 100%);
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            border: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .stat-item .stat-number {
            font-size: 24px;
            font-weight: bold;
            color: var(--primary-color);
        }
        
        .stat-item .stat-label {
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <!-- 公共头部将通过 JavaScript 加载 -->
    <div class="container">
        <div class="card">
            <div class="category-header">
                <h2>分类管理</h2>
            </div>
            
            <div class="category-stats">
                <div class="stat-item">
                    <span class="stat-number" id="categoryCount">0</span>
                    <span class="stat-label">个分类</span>
                </div>
            </div>
            
            <div class="category-form-container">
                <form id="categoryForm" class="form-inline">
                    <div style="flex: 1;">
                        <label for="categoryName">分类名称</label>
                        <input type="text" id="categoryName" name="categoryName" placeholder="请输入分类名称" required>
                    </div>
                    <div>
                        <button type="submit" class="btn btn-primary">添加分类</button>
                    </div>
                </form>
            </div>
            
            <div class="category-list" id="categoryList">
                <!-- 分类列表将通过JavaScript动态添加 -->
            </div>
        </div>
    </div>
    
    <script>
        // 初始化页面
        let crudManager;
        
        PageManager.init({
            onInit: function() {
                // 初始化 CRUD 管理器
                crudManager = new CrudManager({
                    apiUrl: '/api/categories',
                    tableElement: '#categoryList',
                    formElement: '#categoryForm',
                    renderRow: function(category) {
                        const div = document.createElement('div');
                        div.className = 'category-item';
                        div.innerHTML = `
                            <span>📁 ${category.name}</span>
                            <button class="btn btn-danger" onclick="deleteCategory('${category.name}')">删除</button>
                        `;
                        return div;
                    },
                    getFormData: function() {
                        const categoryName = document.getElementById('categoryName').value.trim();
                        if (!categoryName) {
                            alert('请输入分类名称');
                            return null;
                        }
                        return { name: categoryName };
                    },
                    afterSave: function() {
                        FormHelper.reset('#categoryForm');
                        crudManager.loadList();
                        updateCategoryCount();
                    },
                    afterDelete: function() {
                        updateCategoryCount();
                    }
                });
                
                // 加载列表
                crudManager.loadList();
                
                // 绑定事件
                crudManager.bindEvents();
                
                // 更新统计
                updateCategoryCount();
            }
        });
        
        // 删除分类（兼容旧代码）
        function deleteCategory(categoryName) {
            crudManager.delete(categoryName, '分类');
        }
        
        // 更新分类数量
        function updateCategoryCount() {
            fetch('/api/categories')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('categoryCount').textContent = data.length;
                })
                .catch(error => {
                    console.error('获取分类数量失败:', error);
                });
        }
    </script>
</body>
</html>
