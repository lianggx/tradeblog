<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台</title>
    <link rel="stylesheet" href="/admin/admin.css">
    <script src="/admin/common-header.js"></script>
</head>
<body>
    <!-- 公共头部将通过 JavaScript 加载 -->
        <div class="card">
            <h2>欢迎回来！</h2>
            <p>这里是管理后台，您可以在这里管理您的博客内容。</p>
        </div>
        <div class="card">
            <h2>统计概览</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="article-count">0</div>
                    <div class="stat-label">文章总数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="tag-count">0</div>
                    <div class="stat-label">标签总数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="category-count">0</div>
                    <div class="stat-label">分类总数</div>
                </div>
            </div>
        </div>
        <div class="card">
            <h2>最近文章</h2>
            <div class="article-list" id="recent-articles">
                <!-- 文章列表将通过 JavaScript 动态加载 -->
                <p>加载中...</p>
            </div>
        </div>
    <script>
        // 加载统计数据和最近文章
        document.addEventListener('DOMContentLoaded', function() {
            // 加载统计数据
            fetch('/api/articles')
                .then(response => response.json())
                .then(articles => {
                    document.getElementById('article-count').textContent = articles.length;
                    
                    // 提取所有标签并去重
                    const allTags = new Set();
                    articles.forEach(article => {
                        if (article.tags) {
                            article.tags.forEach(tag => allTags.add(tag));
                        }
                    });
                    document.getElementById('tag-count').textContent = allTags.size;
                    document.getElementById('category-count').textContent = '0'; // 暂时设为0，因为当前没有分类功能
                    
                    // 加载最近文章
                    const recentArticles = articles.slice(0, 5);
                    const articleList = document.getElementById('recent-articles');
                    articleList.innerHTML = '';
                    
                    if (recentArticles.length === 0) {
                        articleList.innerHTML = '<p>暂无文章</p>';
                        return;
                    }
                    
                    recentArticles.forEach(article => {
                        const articleItem = document.createElement('div');
                        articleItem.className = 'article-item';
                        articleItem.innerHTML = `
                            <div class="article-info">
                                <h3>${article.title}</h3>
                                <div class="article-meta">
                                    发布于：${new Date(article.published_at).toLocaleString()}
                                    ${article.tags && Array.isArray(article.tags) ? ` | 标签：${article.tags.map(tag => tag.name || tag).join(', ')}` : ''}
                                </div>
                            </div>
                        `;
                        articleList.appendChild(articleItem);
                    });
                })
                .catch(error => {
                    console.error('加载数据失败:', error);
                    document.getElementById('recent-articles').innerHTML = '<p>加载失败，请刷新页面重试</p>';
                });
        });
    </script>
</body>
</html>
