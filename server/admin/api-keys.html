<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Key管理 - 管理后台</title>
    <script src="/admin/common-header.js"></script>
    <link rel="stylesheet" href="/admin/admin.css">
</head>
<body>
    <!-- 公共头部将通过 JavaScript 加载 -->
    <div class="container">
        <div class="card">
            <h2>API Key管理</h2>
            <a href="#" class="btn btn-primary" id="addApiKeyBtn">添加API Key</a>
            
            <table id="apiKeysTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>名称</th>
                        <th>API Key</th>
                        <th>创建时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- API Key列表将通过JavaScript动态添加 -->
                </tbody>
            </table>
        </div>
    </div>
    
    <!-- 添加/编辑 API Key 模态框 -->
    <div id="apiKeyModal" class="modal-overlay" style="display: none;">
        <div class="modal-content" style="max-width: 500px;">
            <h3 id="modalTitle">添加API Key</h3>
            <form id="apiKeyForm">
                <input type="hidden" id="apiKeyId">
                <div class="form-group">
                    <label for="apiKeyDescription">名称</label>
                    <input type="text" id="apiKeyDescription" name="description" required>
                </div>
                <div class="form-group">
                    <label for="apiKeyValue">API Key</label>
                    <input type="text" id="apiKeyValue" name="key" required>
                    <small style="display: block; margin-top: 5px; color: #666;">留空将自动生成</small>
                </div>
                <div style="margin-top: 20px; display: flex; justify-content: flex-end; gap: 10px;">
                    <button type="button" class="btn btn-secondary" id="cancelBtn">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>
    
    <script>
        // 页面加载时获取API Key列表
        document.addEventListener('DOMContentLoaded', function() {
            fetchApiKeys();
            
            // 添加API Key按钮点击事件
            document.getElementById('addApiKeyBtn').addEventListener('click', function() {
                document.getElementById('modalTitle').textContent = '添加API Key';
                document.getElementById('apiKeyForm').reset();
                document.getElementById('apiKeyId').value = '';
                document.getElementById('apiKeyModal').style.display = 'flex';
            });
            
            // 取消按钮点击事件
            document.getElementById('cancelBtn').addEventListener('click', function() {
                document.getElementById('apiKeyModal').style.display = 'none';
            });
            
            // 表单提交事件
            document.getElementById('apiKeyForm').addEventListener('submit', function(e) {
                e.preventDefault();
                saveApiKey();
            });
        });
        
        // 生成随机API Key
        function generateApiKey() {
            return 'tradeblog-' + Math.random().toString(36).substring(2, 15) + '-' + Math.random().toString(36).substring(2, 15);
        }
        
        // 获取API Key列表
        function fetchApiKeys() {
            fetch('/api/api-keys')
                .then(response => response.json())
                .then(data => {
                    const tbody = document.querySelector('#apiKeysTable tbody');
                    tbody.innerHTML = '';
                    
                    data.forEach(apiKey => {
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td>${apiKey.id}</td>
                            <td>${apiKey.description || '无'}</td>
                            <td>${apiKey.key}</td>
                            <td>${apiKey.created_at}</td>
                            <td class="actions">
                                <a href="#" class="btn btn-secondary" onclick="editApiKey(${apiKey.id})">编辑</a>
                                <a href="#" class="btn btn-danger" onclick="deleteApiKey(${apiKey.id})">删除</a>
                            </td>
                        `;
                        tbody.appendChild(row);
                    });
                })
                .catch(error => {
                    console.error('获取API Key列表失败:', error);
                });
        }
        
        // 编辑API Key
        function editApiKey(id) {
            fetch(`/api/api-keys/${id}`)
                .then(response => response.json())
                .then(apiKey => {
                    document.getElementById('modalTitle').textContent = '编辑API Key';
                    document.getElementById('apiKeyId').value = apiKey.id;
                    document.getElementById('apiKeyDescription').value = apiKey.description || '';
                    document.getElementById('apiKeyValue').value = apiKey.key;
                    document.getElementById('apiKeyModal').style.display = 'flex';
                })
                .catch(error => {
                    console.error('获取API Key详情失败:', error);
                });
        }
        
        // 删除API Key
        function deleteApiKey(id) {
            if (confirm('确定要删除这个API Key吗？')) {
                fetch(`/api/api-keys/${id}`, {
                    method: 'DELETE'
                })
                .then(response => {
                    if (!response.ok) {
                        throw new Error('删除失败');
                    }
                    return response.json();
                })
                .then(data => {
                    alert('API Key删除成功！');
                    fetchApiKeys();
                })
                .catch(error => {
                    console.error('删除API Key失败:', error);
                    alert('删除API Key失败，请稍后重试');
                });
            }
        }
        
        // 保存API Key
        function saveApiKey() {
            const id = document.getElementById('apiKeyId').value;
            const description = document.getElementById('apiKeyDescription').value;
            let key = document.getElementById('apiKeyValue').value;
            
            if (!key) {
                key = generateApiKey();
            }
            
            const apiKeyData = {
                description,
                key
            };
            
            const method = id ? 'PUT' : 'POST';
            const url = id ? `/api/api-keys/${id}` : '/api/api-keys';
            
            fetch(url, {
                method: method,
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(apiKeyData)
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('保存失败');
                }
                return response.json();
            })
            .then(data => {
                alert('API Key保存成功！');
                document.getElementById('apiKeyModal').style.display = 'none';
                fetchApiKeys();
            })
            .catch(error => {
                console.error('保存API Key失败:', error);
                alert('保存API Key失败，请稍后重试');
            });
        }
    </script>
</body>
</html>
