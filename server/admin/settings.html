<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网站设置 - 管理后台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f4f4f4;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            background: #333;
            color: #fff;
            padding: 10px 0;
            margin-bottom: 20px;
        }
        
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        nav h1 {
            font-size: 1.5rem;
        }
        
        nav ul {
            display: flex;
            list-style: none;
        }
        
        nav ul li {
            margin-left: 20px;
        }
        
        nav ul li a {
            color: #fff;
            text-decoration: none;
        }
        
        .card {
            background: #fff;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            padding: 20px;
            margin-bottom: 20px;
        }
        
        h2 {
            margin-bottom: 20px;
            color: #333;
        }
        
        .btn {
            display: inline-block;
            padding: 8px 16px;
            background: #333;
            color: #fff;
            text-decoration: none;
            border-radius: 4px;
            margin-right: 10px;
        }
        
        .btn-primary {
            background: #007bff;
        }
        
        .btn-secondary {
            background: #6c757d;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
        }
        
        .form-group input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        
        .alert {
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 4px;
        }
        
        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .alert-danger {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <h1>管理后台</h1>
            <ul>
                <li><a href="/admin">首页</a></li>
                <li><a href="/admin/articles">文章管理</a></li>
                <li><a href="/admin/categories">分类管理</a></li>
                <li><a href="/admin/tags">标签管理</a></li>
                <li><a href="/admin/api-keys">API Key管理</a></li>
                <li><a href="/admin/settings">网站设置</a></li>
                <li><a href="/admin/password">修改密码</a></li>
                <li><a href="/admin/login">退出登录</a></li>
            </ul>
        </nav>
    </header>
    
    <div class="container">
        <div class="card">
            <h2>网站设置</h2>
            <div id="message" class="alert" style="display: none;"></div>
            <form id="settingsForm">
                <div class="form-group">
                    <label for="siteName">网站名称</label>
                    <input type="text" id="siteName" name="site_name" required>
                </div>
                <div class="form-group">
                    <label for="siteTagline">网站副标题</label>
                    <input type="text" id="siteTagline" name="site_tagline" required>
                </div>
                <div style="margin-top: 20px; display: flex; justify-content: flex-end; gap: 10px;">
                    <a href="/admin" class="btn btn-secondary">取消</a>
                    <button type="submit" class="btn btn-primary">保存设置</button>
                </div>
            </form>
        </div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 加载当前设置
            fetch('/api/settings')
                .then(response => response.json())
                .then(settings => {
                    document.getElementById('siteName').value = settings.site_name || 'TradeBlog';
                    document.getElementById('siteTagline').value = settings.site_tagline || '记录生活，分享思考';
                })
                .catch(error => {
                    console.error('加载设置失败:', error);
                });
            
            // 表单提交事件
            document.getElementById('settingsForm').addEventListener('submit', function(e) {
                e.preventDefault();
                
                const siteName = document.getElementById('siteName').value;
                const siteTagline = document.getElementById('siteTagline').value;
                
                fetch('/api/settings', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ site_name: siteName, site_tagline: siteTagline })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.message) {
                        showMessage(data.message, 'success');
                    } else if (data.error) {
                        showMessage(data.error, 'danger');
                    }
                })
                .catch(error => {
                    console.error('保存设置失败:', error);
                    showMessage('保存设置失败，请稍后重试', 'danger');
                });
            });
        });
        
        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = `alert alert-${type}`;
            messageDiv.style.display = 'block';
            
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
