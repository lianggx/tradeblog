<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网站设置 - 管理后台</title>
    <script src="/admin/common-header.js"></script>
    <link rel="stylesheet" href="/admin/admin.css">
</head>
<body>
    <!-- 公共头部将通过 JavaScript 加载 -->
    <div class="container">
        <div class="card">
            <h2>网站设置</h2>
            <div id="message" class="alert" style="display: none;"></div>
            <form id="settingsForm">
                <div class="form-group">
                    <label for="siteName">网站名称</label>
                    <input type="text" id="siteName" name="site_name" required>
                </div>
                <div class="form-group">
                    <label for="siteTagline">网站副标题</label>
                    <input type="text" id="siteTagline" name="site_tagline" required>
                </div>
                <div class="flex-end">
                    <a href="/admin" class="btn btn-secondary">取消</a>
                    <button type="submit" class="btn btn-primary">保存设置</button>
                </div>
            </form>
        </div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 加载当前设置
            fetch('/api/settings')
                .then(response => response.json())
                .then(settings => {
                    document.getElementById('siteName').value = settings.site_name || 'TradeBlog';
                    document.getElementById('siteTagline').value = settings.site_tagline || '记录生活，分享思考';
                })
                .catch(error => {
                    console.error('加载设置失败:', error);
                });
            
            // 表单提交事件
            document.getElementById('settingsForm').addEventListener('submit', function(e) {
                e.preventDefault();
                
                const siteName = document.getElementById('siteName').value;
                const siteTagline = document.getElementById('siteTagline').value;
                
                fetch('/api/settings', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ site_name: siteName, site_tagline: siteTagline })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.message) {
                        showMessage(data.message, 'success');
                    } else if (data.error) {
                        showMessage(data.error, 'danger');
                    }
                })
                .catch(error => {
                    console.error('保存设置失败:', error);
                    showMessage('保存设置失败，请稍后重试', 'danger');
                });
            });
        });
        
        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = `alert alert-${type}`;
            messageDiv.style.display = 'block';
            
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
